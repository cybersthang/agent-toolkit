[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# F7 (CI fix): --cov-fail-under was Python-version-dependent — on 3.10/3.12
# the `setup.py` coverage dropped to ~17% (vs 85% on 3.8) due to differing
# import behaviour, tripping the 70% gate even though all 587 tests pass.
# Coverage is now measured (visibility) but NOT gated in the default invocation;
# CI runs a dedicated `coverage` job on Linux+Py3.8 that enforces the threshold.
# Local dev still sees the term-missing report.
addopts = -ra -q --cov --cov-report=term-missing
